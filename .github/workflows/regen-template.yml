name: Regenerate issue form template

on:
  push:
    branches: [main]
    paths:
      - 'data.json'
      - '.github/scripts/sync.py'

permissions:
  contents: write

jobs:
  regen:
    if: ${{ !contains(github.event.head_commit.message, '[skip-template-regen]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate template
        id: regen
        run: |
          result=$(python .github/scripts/sync.py regen-template)
          echo "result=$result" >> "$GITHUB_OUTPUT"

      - name: Commit updated template
        if: steps.regen.outputs.result == 'changed'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/update-status.yml
          git commit -m "chore: regenerate issue form defaults [skip-template-regen]"
          git push
