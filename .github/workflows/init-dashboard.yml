name: Init status dashboard issue

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render issue body
        run: python .github/scripts/sync.py to-issue --out issue-body.md

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create status-dashboard --color 0E8A16 --description "Pinned status dashboard issue" 2>/dev/null || true

      - name: Create or update dashboard issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --label status-dashboard --state all --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "Updating existing issue #$existing"
            gh issue edit "$existing" --body-file issue-body.md
            gh issue reopen "$existing" 2>/dev/null || true
          else
            echo "Creating new dashboard issue"
            gh issue create \
              --title "AMPM Environment Status Dashboard" \
              --label status-dashboard \
              --body-file issue-body.md
          fi
